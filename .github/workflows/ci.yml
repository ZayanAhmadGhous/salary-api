name: MLOps CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Flake8
        run: |
          flake8 .

      - name: Run Black Check
        run: |
          black --check .

      - name: Run Tests
        run: |
          pytest

      - name: Read Secret
        run: |
          echo "User is ${{ secrets.MY_NAME }}"

  docker-build:

    runs-on: ubuntu-latest

    needs: test

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t salary-api .